services:
  postgres:
    image: postgres:15-alpine
    container_name: netflat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: netflat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d netflat" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: netflat-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: netflat-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: netflat-minio-init
    depends_on:
      minio:
        condition: service_started
    volumes:
      - ./minio-cors.json:/tmp/minio-cors.json:ro
    entrypoint: >
      /bin/sh -c " sleep 5; mc alias set local http://minio:9000 minioadmin minioadmin; mc mb -p local/netflat-media || true; mc anonymous set download local/netflat-media/hls || true; mc anonymous set download local/netflat-media/posters || true; mc anonymous set download local/netflat-media/thumbnails || true; mc cors set local/netflat-media /tmp/minio-cors.json || true; echo 'MinIO bucket initialized with CORS'; exit 0; "

volumes:
  postgres-data:
  minio-data:
